<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home Page</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f7f9;
    }

    /* Navbar */
    .navbar {
        background: #1e3a8a;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
    }

    .navbar h2 {
        font-size: 20px;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        gap: 25px;
    }

    .navbar ul li a {
        text-decoration: none;
        color: white;
        font-weight: bold;
        transition: 0.3s;
    }

    .navbar ul li a:hover {
        color: #ffcc00;
    }

    /* Hero Section */
    .hero {
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .hero h1 {
        font-size: 40px;
        color: #1e3a8a;
        margin-bottom: 10px;
    }

    .hero p {
        font-size: 18px;
        color: #555;
        margin-bottom: 20px;
    }

    .btn {
        padding: 12px 20px;
        background: #1e3a8a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        text-decoration: none;
    }

    .btn:hover {
        background: #0f2557;
    }
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>Product Management</h2>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/add-product">Add Product</a></li>
        <li><a href="/viewproduct">View Products</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to Product Management System</h1>
    <p>Manage your products easily using Spring Boot + Thymeleaf</p>

    <a href="/add-product" class="btn">Get Started</a>
</div>

</body>
</html>
