<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>View Products</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f7f9;
    }

    /* Navbar */
    .navbar {
        background: #1e3a8a;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
    }

    .navbar h2 {
        font-size: 20px;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        gap: 25px;
    }

    .navbar ul li a {
        text-decoration: none;
        color: white;
        font-weight: bold;
    }

    .navbar ul li a:hover {
        color: #ffcc00;
    }

    /* Container */
    .container {
        padding: 40px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3a8a;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    th {
        background: #1e3a8a;
        color: white;
    }

    tr:hover {
        background: #f1f5ff;
    }

    img {
        width: 60px;
        height: 60px;
        border-radius: 5px;
    }

    .btn {
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        color: white;
    }

    .edit {
        background: #28a745;
    }

    .delete {
        background: #dc3545;
    }
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>Product Management</h2>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/add-product">Add Product</a></li>
        <li><a href="/products">View Products</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</div>

<!-- Product Table -->
<div class="container">

    <h2>All Products</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Image</th>
            <th>Action</th>
        </tr>

        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.qty}"></td>

            <td>
                <img th:src="@{'/images/' + ${p.imageName}}" alt="product">
            </td>

            <td>
                <button class="btn edit">Edit</button>
                <button class="btn delete">Delete</button>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
