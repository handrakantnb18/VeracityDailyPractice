<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>500 - Internal Server Error</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #232526, #414345);
}

.error-container{
    text-align:center;
    background:#ffffff;
    padding:50px;
    width:550px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.error-code{
    font-size:100px;
    font-weight:bold;
    color:#dc3545;
    margin-bottom:10px;
}

.error-title{
    font-size:30px;
    color:#333;
    margin-bottom:15px;
}

.error-message{
    font-size:18px;
    color:#666;
    line-height:1.6;
    margin-bottom:25px;
}

.home-btn{
    display:inline-block;
    text-decoration:none;
    background:#dc3545;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
}

.home-btn:hover{
    background:#b02a37;
    transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="error-container">

    <div class="error-code">500</div>

    <h2 class="error-title">Internal Server Error</h2>

    <p class="error-message">
        Something went wrong on our server.
        Please try again later or contact the administrator if the problem persists.
    </p>

    <a href="/" class="home-btn">Return to Home</a>

</div>

</body>
</html>
