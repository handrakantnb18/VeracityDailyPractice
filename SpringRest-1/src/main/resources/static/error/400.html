<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>400 - Bad Request</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #ff9966, #ff5e62);
}

.error-container{
    text-align:center;
    background:#fff;
    padding:50px;
    width:500px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.error-code{
    font-size:100px;
    font-weight:bold;
    color:#ff5e62;
    margin-bottom:10px;
}

.error-title{
    font-size:30px;
    color:#333;
    margin-bottom:15px;
}

.error-message{
    font-size:18px;
    color:#666;
    margin-bottom:25px;
    line-height:1.6;
}

.home-btn{
    display:inline-block;
    text-decoration:none;
    background:#ff5e62;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
}

.home-btn:hover{
    background:#e64a50;
    transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="error-container">
    <div class="error-code">400</div>

    <h2 class="error-title">Bad Request</h2>

    <p class="error-message">
        Something went wrong. The server could not understand your request.
        Please check your input and try again.
    </p>

    <a href="/" class="home-btn">Go Back Home</a>
</div>

</body>
</html>
