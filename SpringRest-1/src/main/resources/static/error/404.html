<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .error-container{
        text-align:center;
        background:#fff;
        padding:50px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.2);
        width:500px;
    }

    .error-code{
        font-size:100px;
        font-weight:bold;
        color:#e63946;
    }

    .error-title{
        font-size:28px;
        color:#333;
        margin-bottom:10px;
    }

    .error-message{
        color:#666;
        font-size:18px;
        margin-bottom:25px;
    }

    .home-btn{
        display:inline-block;
        text-decoration:none;
        background:#1e3a8a;
        color:white;
        padding:12px 25px;
        border-radius:8px;
        font-size:16px;
        transition:0.3s;
    }

    .home-btn:hover{
        background:#14296b;
    }
</style>

</head>
<body>

<div class="error-container">
    <div class="error-code">404</div>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">
        Something went wrong. Please check the URL and try again.
    </p>
    <a href="/" class="home-btn">Go Back Home</a>
</div>

</body>
</html>
